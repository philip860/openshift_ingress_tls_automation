apiVersion: v1
kind: ConfigMap
metadata:
  name: demo-httpd-html
  namespace: demo-app
data:
  index.html: |
    <html>
      <head>
        <title>Duncan Networks Demo App</title>
      </head>
      <body>
        <h1>Duncan Networks Demo App</h1>
        <p>OpenShift + cert-manager test is working.</p>
      </body>
    </html>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-httpd
  namespace: demo-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-httpd
  template:
    metadata:
      labels:
        app: demo-httpd
    spec:
      containers:
        - name: httpd
          image: registry.redhat.io/rhel8/httpd-24:latest
          command:
            - run-httpd
          ports:
            - containerPort: 8080
              protocol: TCP
          volumeMounts:
            - name: web-content
              mountPath: /var/www/html/index.html
              subPath: index.html
              readOnly: true
      volumes:
        - name: web-content
          configMap:
            name: demo-httpd-html