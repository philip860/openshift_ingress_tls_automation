apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-nginx
  namespace: demo-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-nginx
  template:
    metadata:
      labels:
        app: demo-nginx
    spec:
      volumes:
        - name: web-content
          emptyDir: {}

      initContainers:
        - name: init-web-content
          image: registry.access.redhat.com/ubi9/ubi-minimal:latest
          command:
            - /bin/sh
            - -c
            - |
              cat > /work/index.html <<'EOF'
              <html>
              <head>
                <title>Duncan Networks Demo App</title>
              </head>
              <body>
                <h1>Duncan Networks Demo App</h1>
                <p>OpenShift Ingress + cert-manager test is working.</p>
              </body>
              </html>
              EOF
          volumeMounts:
            - name: web-content
              mountPath: /work

      containers:
        - name: nginx
          image: registry.access.redhat.com/ubi9/nginx-124:latest
          ports:
            - containerPort: 8080
              protocol: TCP
          volumeMounts:
            - name: web-content
              mountPath: /opt/app-root/src